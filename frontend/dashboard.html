<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="stylesheet" href="css/layout.css">

</head>

<body>

<div id="sidebar-container"></div>
<script src="components/sidebar.js"></script>

<div class="main-content">

    <div id="header-container"></div>
    <script src="components/header.js"></script>

    <!-- CARDS -->

    <div class="cards">

    <div class="card-box">

        <h3>
            Students
        </h3>

        <p id="students-count">
            0
        </p>

    </div>

    <div class="card-box">

        <h3>
            Courses
        </h3>

        <p id="courses-count">
            0
        </p>

    </div>

    <div class="card-box">

        <h3>
            Enrollments
        </h3>

        <p id="enrollments-count">
            0
        </p>

    </div>

    <div class="card-box">

        <h3>
            Average GPA
        </h3>

        <p id="gpa-count">
            0
        </p>

    </div>

</div>

    <!-- TABLE -->

    <div class="table-container">

        <h2 style="margin-bottom:20px;">
            Recent Activity
        </h2>

        <table>

            <thead>

                <tr>

                    <th>User</th>

                    <th>Action</th>

                    <th>Date</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>
                        Admin
                    </td>

                    <td>
                        Created student
                    </td>

                    <td>
                        Today
                    </td>

                </tr>

                <tr>

                    <td>
                        Teacher
                    </td>

                    <td>
                        Updated grade
                    </td>

                    <td>
                        Today
                    </td>

                </tr>

            </tbody>

        </table>

    </div>

</div>

<script>

function logout(){

    localStorage.removeItem("user")

    window.location.href =
        "login.html"
}

</script>
<script src="js/dashboard.js"></script>
</body>
</html>
