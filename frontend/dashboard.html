<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" href="css/layout.css">

</head>

<body class="bg-dark text-light">

<div class="main-content">

    <div id="header-container"></div>

    <script src="components/header.js"></script>

    <div class="container py-4">

        <div class="mb-4">

            <h1 class="fw-bold">
                Dashboard
            </h1>

            <p id="welcome"
               class="text-muted">
            </p>

        </div>

        <div class="row g-3 mb-4">

            <div class="col-md-3">

                <div class="card bg-secondary border-0 shadow p-3">

                    <h6 id="metric1-title">
                        Metric 1
                    </h6>

                    <h2 id="metric1-value">
                        0
                    </h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card bg-secondary border-0 shadow p-3">

                    <h6 id="metric2-title">
                        Metric 2
                    </h6>

                    <h2 id="metric2-value">
                        0
                    </h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card bg-secondary border-0 shadow p-3">

                    <h6 id="metric3-title">
                        Metric 3
                    </h6>

                    <h2 id="metric3-value">
                        0
                    </h2>

                </div>

            </div>

            <div class="col-md-3">

                <div class="card bg-secondary border-0 shadow p-3">

                    <h6 id="metric4-title">
                        Metric 4
                    </h6>

                    <h2 id="metric4-value">
                        0
                    </h2>

                </div>

            </div>

        </div>

        <div class="card bg-secondary border-0 shadow p-3 mb-4">

            <h5 class="mb-3">
                Quick Actions
            </h5>

            <div id="actions"
                 class="d-flex flex-wrap gap-2">
            </div>

        </div>

        <button class="btn btn-danger"
                onclick="logout()">

            Logout

        </button>

    </div>

</div>

<script>

const API = "http://127.0.0.1:5000"

const user = JSON.parse(
    localStorage.getItem("user")
)


// =========================
// AUTH GUARD
// =========================
if(!user){

    window.location.href =
        "login.html"
}

document.getElementById(
    "welcome"
).innerText =
    `Welcome ${user.username}`

const roleInfo = document.getElementById("role-info")
if (roleInfo && user) {
    roleInfo.innerText = user.role.toUpperCase()
}

function renderActions(){

    const actions =
        document.getElementById("actions")

    let html = ""

    if(user.role === "admin"){

        html += `
            <a href="students.html"
               class="btn btn-primary">
                Students
            </a>

            <a href="courses.html"
               class="btn btn-primary">
                Courses
            </a>

            <a href="enrollments.html"
               class="btn btn-primary">
                Enrollments
            </a>

            <a href="grades.html"
               class="btn btn-primary">
                Grades
            </a>

            <a href="grades_distribution.html"
               class="btn btn-primary">
                Grade Distribution
            </a>

            <a href="transcript.html"
               class="btn btn-primary">
                Student Transcript
            </a>
        `
    }

    else if(user.role === "teacher"){

        html += `
            <a href="courses.html"
               class="btn btn-primary">
                My Courses
            </a>

            <a href="enrollments.html"
               class="btn btn-primary">
                Enrollments
            </a>

            <a href="grades.html"
               class="btn btn-primary">
                Grades
            </a>

            <a href="grades_distribution.html"
               class="btn btn-primary">
                Grade Distribution
            </a>

            <a href="transcript.html"
               class="btn btn-primary">
                Student Transcript
            </a>
        `
    }

    else if(user.role === "student"){

        html += `
            <a href="courses.html"
               class="btn btn-primary">
                Courses
            </a>

            <a href="grades.html"
               class="btn btn-primary">
                My Grades
            </a>

            <a href="transcript.html"
               class="btn btn-primary">
                My Transcript
            </a>
        `
    }

    actions.innerHTML = html
}

function setMetric(index, title, value){

    document.getElementById(
        `metric${index}-title`
    ).innerText = title

    document.getElementById(
        `metric${index}-value`
    ).innerText = value
}

async function loadStats(){

    try{

        const response = await fetch(
            `${API}/stats`,
            {
                headers:{
                    "Role": user.role,

                    "Student-Id":
                        user.id_student || "",

                    "Instructor-Id":
                        user.id_instructor || ""
                }
            }
        )

        const data = await response.json()


        if(user.role === "admin"){

            setMetric(
                1,
                "Students",
                data.students ?? 0
            )

            setMetric(
                2,
                "Courses",
                data.courses ?? 0
            )

            setMetric(
                3,
                "Enrollments",
                data.enrollments ?? 0
            )

            setMetric(
                4,
                "Avg GPA",
                data.avg_gpa ?? 0
            )
        }

        else if(user.role === "teacher"){

            setMetric(
                1,
                "My Courses",
                data.my_courses ?? 0
            )

            setMetric(
                2,
                "My Students",
                data.my_students ?? 0
            )

            setMetric(
                3,
                "Pending Grades",
                data.pending_grades ?? 0
            )

            setMetric(
                4,
                "Class GPA",
                data.class_avg_gpa ?? 0
            )
        }

        else if(user.role === "student"){

            setMetric(
                1,
                "My Courses",
                data.my_courses ?? 0
            )

            setMetric(
                2,
                "My GPA",
                data.my_gpa ?? 0
            )

            setMetric(
                3,
                "Passed Courses",
                data.passed_courses ?? 0
            )

            setMetric(
                4,
                "Semester",
                data.current_semester ?? "-"
            )
        }

    }catch(error){

        console.log(
            "Stats error:",
            error
        )

        for(let i = 1; i <= 4; i++){

            setMetric(i, "Error", 0)
        }
    }
}

function logout(){

    localStorage.removeItem("user")

    window.location.href =
        "login.html"
}


renderActions()

loadStats()

</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
