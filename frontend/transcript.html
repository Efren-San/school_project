<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Transcript</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container py-5">

    <h1 class="mb-4">
        Student Transcript
    </h1>

    <div class="card bg-secondary p-3 mb-4">

        <h4 id="student-name"></h4>

        <p>
            Total Credits:
            <strong id="total-credits"></strong>
        </p>

        <p>
            Average GPA:
            <strong id="avg-gpa"></strong>
        </p>

    </div>

    <table class="table table-dark table-striped">

        <thead>

            <tr>

                <th>Course</th>
                <th>Credits</th>
                <th>Final Grade</th>
                <th>GPA Points</th>

            </tr>

        </thead>

        <tbody id="transcript-body"></tbody>

    </table>

    <button class="btn btn-primary"
            onclick="goBack()">

        Back

    </button>

</div>

<script src="js/transcript.js"></script>

</body>
</html>
