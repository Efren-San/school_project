<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Transcript</title>

    <link rel="stylesheet" href="css/layout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="main-content">
    <div id="header-container"></div>
    <script src="components/header.js"></script>


    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="fw-bold">
                Transcript
            </h1>

            <p class="mb-0" id="role-info"></p>

        </div>

        <div>

            <button class="btn btn-secondary me-2"
                    onclick="goBack()">
                Dashboard
            </button>

            <button class="btn btn-danger"
                    onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <div class="row g-3 mb-4">

        <div class="col-md-6">

            <div class="card bg-secondary border-0 shadow p-3">

                <h6>Total Credits</h6>

                <h2 id="total-credits">0</h2>

            </div>

        </div>

        <div class="col-md-6">

            <div class="card bg-secondary border-0 shadow p-3">

                <h6>Average GPA</h6>

                <h2 id="avg-gpa">0.00</h2>

            </div>

        </div>

    </div>

    <div class="card bg-secondary border-0 shadow">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-dark table-hover align-middle mb-0">

                    <thead>

                        <tr>

                            <th>Course</th>

                            <th>Credits</th>

                            <th>Final Grade</th>

                            <th>GPA Points</th>

                        </tr>

                    </thead>

                    <tbody id="transcript-table">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

const API_URL = "http://127.0.0.1:5000"

const user = JSON.parse(
    localStorage.getItem("user")
)

if(!user){

    window.location.href =
        "./login.html"
}

document.getElementById("role-info").innerText =
    `Logged as ${user.role}`

const studentId =
    user.id_student || user.id

async function loadTranscript(){

    try{

        const response =
            await fetch(
                `${API_URL}/transcript/${studentId}`,
                {
                    headers:{
                        "Role": user.role,
                        "Student-Id": user.id_student || "",
                        "Instructor-Id": user.id_instructor || ""
                    }
                }
            )

        const data = await response.json()

        document.getElementById("total-credits").innerText =
            data.total_credits

        document.getElementById("avg-gpa").innerText =
            data.avg_gpa

        const table =
            document.getElementById("transcript-table")

        table.innerHTML = ""

        data.transcript.forEach(item => {

            table.innerHTML += `
                <tr>
                    <td>${item.course}</td>
                    <td>${item.credits}</td>
                    <td>${item.final_grade}</td>
                    <td>${item.gpa_points}</td>
                </tr>
            `
        })

    }catch(error){

        console.log("Transcript error:", error)
    }
}

function goBack(){

    window.location.href =
        "./dashboard.html"
}

function logout(){

    localStorage.removeItem("user")

    window.location.href =
        "./login.html"
}

loadTranscript()

</script>

</body>
</html>
