<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>School System</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-dark text-light">

    <div class="container mt-5">

        <h1 class="text-center mb-4">
            SCHOOL SYSTEM
        </h1>

        <!-- FORM -->

        <div class="card bg-secondary p-4 mb-4">

            <h3>Add Student</h3>

            <input type="text" id="id_student" class="form-control mb-2" placeholder="Student ID">

            <input type="text" id="name_student" class="form-control mb-2" placeholder="Student Name">

            <input type="date" id="birthdate" class="form-control mb-2">

            <input type="text" id="gender" class="form-control mb-2" placeholder="M or F">

            <input type="number" id="enrollment_year" class="form-control mb-2" placeholder="Enrollment Year">

            <input type="text" id="id_department" class="form-control mb-2" placeholder="Department ID">

            <button class="btn btn-primary" onclick="addStudent()">
                Add Student
            </button>

        </div>

        <!-- TABLE -->

        <table class="table table-dark table-striped">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Gender</th>
                    <th>Department</th>
                    <th>Actions</th>
                </tr>

            </thead>

            <tbody id="studentsTable">

            </tbody>

        </table>

    </div>

    <script src="app.js"></script>

</body>

</html>
