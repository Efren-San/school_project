<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Grade Distribution</title>

    <link rel="stylesheet" href="css/layout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="main-content">

    <div id="header-container"></div>
    <script src="components/header.js"></script>

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="fw-bold">
                Grade Distribution
            </h1>

            <p class="mb-0" id="role-info"></p>

        </div>

        <div>

            <button class="btn btn-secondary me-2"
                    onclick="goBack()">
                Dashboard
            </button>

            <button class="btn btn-danger"
                    onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <div class="card bg-secondary border-0 shadow p-3 mb-4">

        <div class="d-flex gap-2">

            <select id="course-id"
                    class="form-select">
            </select>

            <button class="btn btn-primary"
                    onclick="loadDistribution()">
                Search
            </button>

        </div>

    </div>

    <div class="card bg-secondary border-0 shadow">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-dark table-hover align-middle mb-0">

                    <thead>

                        <tr>

                            <th>Category</th>

                            <th>Total Students</th>

                        </tr>

                    </thead>

                    <tbody id="distribution-body">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/distribution.js"></script>

<script>
const user = JSON.parse(localStorage.getItem("user"))

if(!user){
    window.location.href = "./login.html"
}

document.getElementById("role-info").innerText =
    `Logged as ${user.role}`

function goBack(){
    window.location.href = "./dashboard.html"
}

function logout(){
    localStorage.removeItem("user")
    window.location.href = "./login.html"
}

</script>

</body>
</html>
