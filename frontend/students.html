<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Students</title>

    <link rel="stylesheet" href="css/layout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


</head>

<body class="bg-dark text-light">



<div class="main-content">
    <div id="header-container"></div>
    <script src="components/header.js"></script>
    <!-- HEADER -->

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="fw-bold">
                Students
            </h1>

            <p class="mb-0" id="role-info"></p>

        </div>

        <div>

            <button class="btn btn-secondary me-2"
                    onclick="goBack()">
                Dashboard
            </button>

            <button class="btn btn-danger"
                    onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <!-- FORM -->

    <div class="card bg-secondary border-0 shadow mb-4"
         id="form-container">

        <div class="card-body">

            <h3 class="mb-3">
                Create Student
            </h3>

            <div class="row g-3">

                <div class="col-md-4">

                    <input type="text"
                           id="id_student"
                           class="form-control"
                           placeholder="Student ID">

                </div>

                <div class="col-md-4">

                    <input type="text"
                           id="name_student"
                           class="form-control"
                           placeholder="Student Name">

                </div>

                <div class="col-md-4">

                    <input type="date"
                           id="birthdate"
                           class="form-control">

                </div>

                <div class="col-md-3">

                    <input type="text"
                           id="gender"
                           class="form-control"
                           placeholder="M/F">

                </div>

                <div class="col-md-3">

                    <input type="number"
                           id="enrollment_year"
                           class="form-control"
                           placeholder="Enrollment Year">

                </div>

                <div class="col-md-3">

                    <input type="text"
                           id="id_department"
                           class="form-control"
                           placeholder="Department ID">

                </div>

                <div class="col-md-3">

                    <button class="btn btn-primary w-100"
                            onclick="createStudent()">
                        Create
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- TABLE -->

    <div class="card bg-secondary border-0 shadow">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-dark table-hover align-middle mb-0">

                    <thead>

                        <tr>

                            <th>ID</th>

                            <th>Name</th>

                            <th>Birthdate</th>

                            <th>Gender</th>

                            <th>Year</th>

                            <th>Department</th>

                            <th>Actions</th>

                        </tr>

                    </thead>

                    <tbody id="students-body">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

const API_URL = "http://127.0.0.1:5000"

const user = JSON.parse(
    localStorage.getItem("user")
)

if(!user){

    window.location.href =
        "./login.html"
}

document.getElementById("role-info").innerText =
    `Logged as ${user.role}`



if(user.role !== "admin"){

    document.getElementById(
        "form-container"
    ).style.display = "none"
}


async function loadStudents(){

    try{

        const response = await fetch(
            API_URL + "/students",
            {
                headers:{
                    "Role": user.role
                }
            }
        )

        const data = await response.json()

        const table =
            document.getElementById(
                "students-body"
            )

        table.innerHTML = ""

        data.forEach(student => {

            table.innerHTML += `
            
            <tr>

                <td>${student.id_student}</td>

                <td>${student.name_student}</td>

                <td>${student.birthdate}</td>

                <td>${student.gender}</td>

                <td>${student.enrollment_year}</td>

                <td>${student.id_department}</td>

                <td>

                    ${
                        user.role === "admin"

                        ?

                        `
                        <button
                            class="btn btn-warning btn-sm me-1"
                            onclick="editStudent('${student.id_student}')"
                        >
                            Edit
                        </button>

                        <button
                            class="btn btn-danger btn-sm"
                            onclick="deleteStudent('${student.id_student}')"
                        >
                            Delete
                        </button>
                        `

                        :

                        "-"
                    }

                </td>

            </tr>
            `
        })

    }catch(error){

        console.log(error)
    }
}

async function createStudent(){

    const student = {

        id_student:
            document.getElementById(
                "id_student"
            ).value,

        name_student:
            document.getElementById(
                "name_student"
            ).value,

        birthdate:
            document.getElementById(
                "birthdate"
            ).value,

        gender:
            document.getElementById(
                "gender"
            ).value,

        enrollment_year:
            parseInt(
                document.getElementById(
                    "enrollment_year"
                ).value
            ),

        id_department:
            document.getElementById(
                "id_department"
            ).value
    }

    try{

        const response = await fetch(
            API_URL + "/students",
            {
                method: "POST",

                headers:{
                    "Content-Type":
                        "application/json",

                    "Role": user.role
                },

                body: JSON.stringify(student)
            }
        )

        const data = await response.json()

        alert(data.message || data.error)

        loadStudents()

    }catch(error){

        console.log(error)
    }
}

async function deleteStudent(id){

    if(!confirm("Delete student?")){

        return
    }

    try{

        const response = await fetch(
            API_URL + "/students/" + id,
            {
                method: "DELETE",

                headers:{
                    "Role": user.role
                }
            }
        )

        const data = await response.json()

        alert(data.message || data.error)

        loadStudents()

    }catch(error){

        console.log(error)
    }
}

async function editStudent(id){

    const newName = prompt(
        "New student name:"
    )

    if(!newName){

        return
    }

    try{

        const response = await fetch(
            API_URL + "/students/" + id,
            {
                method: "PUT",

                headers:{
                    "Content-Type":
                        "application/json",

                    "Role": user.role
                },

                body: JSON.stringify({

                    name_student: newName,

                    birthdate: "2000-01-01",

                    gender: "M",

                    enrollment_year: 2024,

                    id_department: "D001"
                })
            }
        )

        const data = await response.json()

        alert(data.message || data.error)

        loadStudents()

    }catch(error){

        console.log(error)
    }
}


function goBack(){

    window.location.href =
        "./dashboard.html"
}

function logout(){

    localStorage.removeItem("user")

    window.location.href =
        "./login.html"
}


loadStudents()

</script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="js/students.js"></script>
</body>
</html>
