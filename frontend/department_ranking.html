<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Department Ranking</title>

    <link rel="stylesheet" href="css/layout.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="main-content">

    <div id="header-container"></div>
    <script src="components/header.js"></script>

    <div class="d-flex justify-content-between align-items-center mb-4">

        <div>

            <h1 class="fw-bold">
                Department Ranking
            </h1>

            <p class="mb-0" id="role-info"></p>

        </div>

        <div>

            <button class="btn btn-secondary me-2"
                    onclick="goBack()">
                Dashboard
            </button>

            <button class="btn btn-danger"
                    onclick="logout()">
                Logout
            </button>

        </div>

    </div>

    <div class="card bg-secondary border-0 shadow">

        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-dark table-hover align-middle mb-0">

                    <thead>

                        <tr>

                            <th>Rank</th>

                            <th>Department</th>

                            <th>Total Students</th>

                            <th>Average GPA</th>

                        </tr>

                    </thead>

                    <tbody id="ranking-body">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

const API_URL = "http://127.0.0.1:5000"

const user = JSON.parse(localStorage.getItem("user"))

if(!user){
    window.location.href = "./login.html"
}

document.getElementById("role-info").innerText =
    `Logged as ${user.role}`


async function loadRanking(){

    try{

        const response = await fetch(
            API_URL + "/departments/ranking",
            {
                headers:{
                    "Role": user.role
                }
            }
        )

        const data = await response.json()

        const table = document.getElementById("ranking-body")

        table.innerHTML = ""

        let rank = 1

        data.forEach(dep => {

            let badge = ""

            if(rank === 1){
                badge = "🥇"
            }else if(rank === 2){
                badge = "🥈"
            }else if(rank === 3){
                badge = "🥉"
            }

            table.innerHTML += `
                <tr>
                    <td>${badge} ${rank}</td>
                    <td>${dep.name_department}</td>
                    <td>${dep.total_students}</td>
                    <td>${dep.avg_gpa}</td>
                </tr>
            `

            rank++
        })

    }catch(error){

        console.log("Ranking error:", error)
    }
}


function goBack(){
    window.location.href = "./dashboard.html"
}

function logout(){
    localStorage.removeItem("user")
    window.location.href = "./login.html"
}

loadRanking()

</script>

</body>
</html>
